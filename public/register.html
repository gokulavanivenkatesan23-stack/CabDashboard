<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-6 rounded shadow w-80">

<h2 class="text-xl font-semibold mb-4 text-center">Register</h2>

<input id="username" placeholder="Username" class="border p-2 w-full mb-3 rounded">

<input id="password" type="password" placeholder="Password" class="border p-2 w-full mb-4 rounded">

<button onclick="register()" class="bg-blue-600 text-white w-full py-2 rounded">
Register
</button>

<p class="text-sm mt-3 text-center">
Already have account? 
<a href="login.html" class="text-blue-600">Login</a>
</p>

</div>

<script>

function register(){

fetch("/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:username.value,
password:password.value
})
})
.then(res=>res.text())
.then(msg=>{
alert(msg)
window.location="login.html"
})

}

</script>

</body>
</html>
