<!DOCTYPE html>
<html>

<head>
<title>Cab Fleet Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body class="bg-gray-100">

<div class="flex flex-col md:flex-row min-h-screen">

<!-- Sidebar -->
<div class="bg-gray-900 text-gray-200 w-full md:w-64 p-4">

<h2 class="text-xl font-semibold mb-4">Fleet Dashboard</h2>

<ul class="flex md:flex-col gap-4 text-sm">

<li onclick="scrollToSection('entry')" class="cursor-pointer hover:text-white">Dashboard</li>

<li onclick="window.location.href='drivers.html'" class="cursor-pointer hover:text-white">
Driver Details
</li>

</ul>

</div>

<!-- Main -->
<div class="flex-1 p-4 md:p-10">

<!-- Header -->
<div class="flex justify-between items-center mb-6">

<h1 class="text-xl md:text-2xl font-semibold">Cab Business Operations</h1>

<div>
<span class="mr-4 text-gray-600">
Logged in as: <b id="usernameDisplay"></b>
</span>

<button onclick="logout()" 
class="bg-red-600 text-white px-4 py-2 rounded">
Logout
</button>
</div>

</div>

<!-- Entry Form -->
<div id="entry" class="bg-white p-6 rounded shadow mb-8">

<h2 class="text-lg font-medium mb-4">Add Entry</h2>

<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-5 gap-4">

<input id="date" type="date" class="border p-2 rounded">

<select id="driverName" class="border p-2 rounded">
<option value="">Select Driver</option>
</select>

<input id="carNumber" placeholder="Car Number" class="border p-2 rounded">

<input id="driverTrips" type="number" placeholder="Trips" class="border p-2 rounded">

<input id="driverEarning" type="number" placeholder="Earnings" class="border p-2 rounded">

</div>

<div class="mt-4 flex gap-3">

<button onclick="saveData()" id="saveBtn"
class="bg-blue-600 text-white px-4 py-2 rounded">
Add Entry
</button>

<button onclick="cancelEdit()" id="cancelBtn"
class="bg-gray-500 text-white px-4 py-2 rounded hidden">
Cancel
</button>

</div>

</div>

<!-- Summary -->
<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 mb-8">

<div class="bg-white p-5 rounded shadow">
<p class="text-gray-500 text-sm">Today Revenue</p>
<p id="today" class="text-xl font-semibold">0</p>
</div>

<div class="bg-white p-5 rounded shadow">
<p class="text-gray-500 text-sm">Week Revenue</p>
<p id="week" class="text-xl font-semibold">0</p>
</div>

<div class="bg-white p-5 rounded shadow">
<p class="text-gray-500 text-sm">Month Revenue</p>
<p id="month" class="text-xl font-semibold">0</p>
</div>

<div class="bg-white p-5 rounded shadow">
<p class="text-gray-500 text-sm">Total Trips</p>
<p id="totalTrips" class="text-xl font-semibold">0</p>
</div>

</div>

<!-- Comparison -->
<div class="bg-white p-6 rounded shadow mb-8">

<h2 class="text-lg font-medium mb-4">Comparison</h2>

<p>Today: <b id="cToday"></b></p>
<p>Yesterday: <b id="cYesterday"></b></p>
<p>Week: <b id="cWeek"></b></p>

</div>

<!-- Chart -->
<div class="bg-white p-6 rounded shadow mb-8">

<h2 class="text-lg font-medium mb-4">Driver Revenue (Total)</h2>

<canvas id="chart"></canvas>

</div>

<!-- Table -->
<div class="bg-white p-6 rounded shadow">

<div class="flex justify-between mb-4">

<input id="searchInput"
placeholder="Search"
class="border p-2 rounded w-64"
onkeyup="searchDriver()">

<button onclick="downloadExcel()"
class="bg-blue-600 text-white px-4 py-2 rounded">
Export Excel
</button>

</div>

<div class="overflow-x-auto">

<table class="w-full border">

<thead class="bg-gray-50">

<tr>
<th class="p-3 border">Driver</th>
<th class="p-3 border">Car</th>
<th class="p-3 border">Trips</th>
<th class="p-3 border">Earnings</th>
<th class="p-3 border">Action</th>
</tr>

</thead>

<tbody id="tableData"></tbody>

</table>

</div>

</div>

</div>
</div>

<script>

let chart
let editId=null
let isEditMode=false

// Username
document.getElementById("usernameDisplay").innerText =
localStorage.getItem("username") || "User"

// ================= DRIVER DROPDOWN =================
function loadDriverDropdown(){

fetch("/drivers")
.then(res=>res.json())
.then(data=>{

let options = `<option value="">Select Driver</option>`

data.forEach(d=>{
options += `<option value="${d.name}">${d.name}</option>`
})

driverName.innerHTML = options

})

}

// ================= LOAD DATA =================
function loadData(){

fetch("/data")
.then(res=>res.json())
.then(data=>{

let html=""
let trips=0

let driverMap = {}

// Table + grouping
data.forEach(d=>{

trips += Number(d.driverTrips)

// GROUPING
if(!driverMap[d.driverName]){
driverMap[d.driverName]=0
}
driverMap[d.driverName]+=Number(d.driverEarning)

// Table
html+=`
<tr>

<td class="p-2 border">${d.driverName}</td>
<td class="p-2 border">${d.carNumber}</td>
<td class="p-2 border">${d.driverTrips}</td>
<td class="p-2 border">${d.driverEarning}</td>

<td class="p-2 border">

<button onclick="editData('${d._id}','${d.date}','${d.driverName}','${d.carNumber}','${d.driverTrips}','${d.driverEarning}')">
Edit
</button>

<button onclick="deleteData('${d._id}')" class="text-red-600 ml-2">
Delete
</button>

</td>

</tr>
`
})

// Update table
tableData.innerHTML=html
totalTrips.innerText=trips

// SORT DRIVERS BY EARNING
let sorted = Object.entries(driverMap).sort((a,b)=>b[1]-a[1])

let labels = sorted.map(x=>x[0])
let revenue = sorted.map(x=>x[1])

// Chart
if(chart) chart.destroy()

chart = new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Total Earnings per Driver",
data:revenue
}]
}
})

})

}

// ================= TOTALS =================
function loadTotals(){

fetch("/totals")
.then(res=>res.json())
.then(t=>{
today.innerText=t.today
week.innerText=t.week
month.innerText=t.month
})

}

// ================= COMPARISON =================
function loadComparison(){

fetch("/comparison")
.then(res=>res.json())
.then(c=>{
cToday.innerText=c.today
cYesterday.innerText=c.yesterday
cWeek.innerText=c.week
})

}

// ================= SAVE =================
function saveData(){

if(!driverName.value){
alert("Select Driver")
return
}

let url="/add"
let method="POST"

if(isEditMode){
url="/update/"+editId
method="PUT"
}

fetch(url,{
method:method,
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
date:date.value,
driverName:driverName.value,
carNumber:carNumber.value,
driverTrips:driverTrips.value,
driverEarning:driverEarning.value
})
})
.then(res=>res.text())
.then(msg=>{
alert(msg)
loadData()
loadTotals()
loadComparison()
cancelEdit()
})

}

// ================= EDIT =================
function editData(id,d,n,c,t,e){

editId=id
isEditMode=true

date.value=d
driverName.value=n
carNumber.value=c
driverTrips.value=t
driverEarning.value=e

saveBtn.innerText="Update"
cancelBtn.classList.remove("hidden")

}

// ================= CANCEL =================
function cancelEdit(){

editId=null
isEditMode=false

document.querySelectorAll("input").forEach(i=>i.value="")
driverName.value=""

saveBtn.innerText="Add Entry"
cancelBtn.classList.add("hidden")

}

// ================= DELETE =================
function deleteData(id){

fetch("/delete/"+id,{method:"DELETE"})
.then(()=>{
loadData()
loadTotals()
})

}

// ================= SEARCH =================
function searchDriver(){

let val=document.getElementById("searchInput").value.toLowerCase()

document.querySelectorAll("#tableData tr").forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(val)?"":"none"
})

}

// ================= EXCEL =================
function downloadExcel(){

fetch("/data")
.then(res=>res.json())
.then(data=>{
const ws = XLSX.utils.json_to_sheet(data)
const wb = XLSX.utils.book_new()
XLSX.utils.book_append_sheet(wb, ws, "Data")
XLSX.writeFile(wb,"cab_dashboard.xlsx")
})

}

// ================= LOGOUT =================
function logout(){

fetch("/logout")
.then(()=>{
localStorage.clear()
window.location="/login.html"
})

}

// ================= INIT =================
window.onload=function(){

loadDriverDropdown()
loadData()
loadTotals()
loadComparison()

}

</script>

</body>
</html>
