<!DOCTYPE html>
<html>

<head>
<title>Cab Fleet Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-gray-100 select-none">

<!-- Loader -->
<div id="loader" class="fixed inset-0 bg-white flex items-center justify-center z-50">
🚖 Loading...
</div>

<div class="flex min-h-screen">

<!-- Sidebar (Desktop only) -->
<div class="hidden md:block bg-gray-900 text-gray-200 w-64 p-4">
<h2 class="text-xl font-semibold mb-4">Fleet Dashboard</h2>

<ul class="space-y-3">
<li onclick="location.reload()" class="cursor-pointer hover:text-white">Dashboard</li>
<li onclick="window.location='drivers.html'" class="cursor-pointer hover:text-white">Drivers</li>
</ul>
</div>

<!-- Main -->
<div class="flex-1 p-4 md:p-10 pb-24">

<!-- Header -->
<div class="flex justify-between items-center mb-6">

<h1 class="text-xl md:text-2xl font-semibold">Cab Business</h1>

<div class="relative">
<button onclick="toggleProfile()" class="bg-gray-800 text-white px-4 py-2 rounded">
👤 <span id="username">User</span>
</button>

<div id="profileMenu" class="hidden absolute right-0 mt-2 bg-white shadow rounded w-40">
<button onclick="logout()" class="block w-full text-left px-4 py-2 hover:bg-gray-100">Logout</button>
</div>
</div>

</div>

<!-- Entry Form -->
<div class="bg-white p-5 rounded-xl shadow mb-6">

<h2 class="text-lg font-medium mb-4">Driver Entry</h2>

<div class="grid grid-cols-2 md:grid-cols-5 gap-3">

<div class="bg-gray-50 p-2 rounded-xl">
<label class="text-xs text-gray-500">Date</label>
<input id="date" type="date" class="border p-3 rounded-xl w-full text-lg">
</div>

<div class="bg-gray-50 p-2 rounded-xl">
<label class="text-xs text-gray-500">Driver</label>
<select id="driverName" class="border p-3 rounded-xl w-full text-lg">
<option value="">Select Driver</option>
</select>
</div>

<div class="bg-gray-50 p-2 rounded-xl">
<label class="text-xs text-gray-500">Car</label>
<input id="carNumber" class="border p-3 rounded-xl w-full text-lg">
</div>

<div class="bg-gray-50 p-2 rounded-xl">
<label class="text-xs text-gray-500">Trips</label>
<input id="driverTrips" type="number" class="border p-3 rounded-xl w-full text-lg">
</div>

<div class="bg-gray-50 p-2 rounded-xl">
<label class="text-xs text-gray-500">Earnings</label>
<input id="driverEarning" type="number" class="border p-3 rounded-xl w-full text-lg">
</div>

</div>

</div>

<!-- Cards -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">

<div class="bg-white p-4 rounded-xl shadow">
<p class="text-xs text-gray-500">Today</p>
<p id="today" class="text-lg font-bold">0</p>
</div>

<div class="bg-white p-4 rounded-xl shadow">
<p class="text-xs text-gray-500">Week</p>
<p id="week" class="text-lg font-bold">0</p>
</div>

<div class="bg-white p-4 rounded-xl shadow">
<p class="text-xs text-gray-500">Month</p>
<p id="month" class="text-lg font-bold">0</p>
</div>

<div class="bg-white p-4 rounded-xl shadow">
<p class="text-xs text-gray-500">Trips</p>
<p id="totalTrips" class="text-lg font-bold">0</p>
</div>

</div>

<!-- Chart -->
<div class="bg-white p-5 rounded-xl shadow mb-6">
<h2 class="mb-3">Driver Earnings</h2>
<canvas id="chart"></canvas>
</div>

<!-- Data -->
<div id="dataContainer"></div>

</div>
</div>

<!-- Floating Add Button -->
<button onclick="saveData()" 
class="fixed bottom-20 right-5 bg-blue-600 text-white px-6 py-3 rounded-full shadow-lg md:hidden">
Add Entry
</button>

<!-- Bottom Nav -->
<div class="fixed bottom-0 left-0 right-0 bg-white shadow md:hidden flex justify-around p-3">

<button onclick="location.reload()" class="text-blue-600">
🏠 <br><span class="text-xs">Home</span>
</button>

<button onclick="window.location='drivers.html'">
👤 <br><span class="text-xs">Drivers</span>
</button>

</div>

<script>

let chart
let editId = null

// ===== Load Drivers =====
function loadDrivers(){
fetch("/drivers")
.then(res=>res.json())
.then(data=>{
let options = `<option value="">Select Driver</option>`
data.forEach(d=>{
options += `<option value="${d.name}">${d.name}</option>`
})
driverName.innerHTML = options
})
}

// ===== Load Data =====
function loadData(){
fetch("/data")
.then(res=>res.json())
.then(data=>{

let mobileHTML = ""
let tableRows = ""
let trips=0
let driverMap = {}

// build data
data.forEach(d=>{

trips += Number(d.driverTrips)

if(!driverMap[d.driverName]) driverMap[d.driverName]=0
driverMap[d.driverName]+=Number(d.driverEarning)

// mobile card
mobileHTML += `
<div class="bg-white p-4 mb-3 rounded-xl shadow">

<p class="font-bold">${d.driverName}</p>
<p class="text-sm text-gray-500">${d.carNumber}</p>

<p class="mt-2">Trips: ${d.driverTrips}</p>
<p>₹ ${d.driverEarning}</p>

<p class="text-xs text-gray-400 mt-1">
${new Date(d.date).toLocaleDateString()}
</p>

<div class="mt-2">
<button onclick="editData('${d._id}')" class="text-blue-600">Edit</button>
<button onclick="deleteData('${d._id}')" class="text-red-600 ml-3">Delete</button>
</div>

</div>
`

// desktop rows
tableRows += `
<tr class="border-t">
<td class="p-2">${new Date(d.date).toLocaleDateString()}</td>
<td class="p-2">${d.driverName}</td>
<td class="p-2">${d.carNumber}</td>
<td class="p-2">${d.driverTrips}</td>
<td class="p-2">${d.driverEarning}</td>
<td class="p-2">
<button onclick="editData('${d._id}')" class="text-blue-600">Edit</button>
<button onclick="deleteData('${d._id}')" class="text-red-600 ml-2">Delete</button>
</td>
</tr>
`
})

// choose view
if(window.innerWidth < 768){

dataContainer.innerHTML = mobileHTML

}else{

dataContainer.innerHTML = `
<div class="overflow-x-auto">
<table class="w-full border bg-white rounded-xl overflow-hidden">
<thead class="bg-gray-100">
<tr>
<th class="p-2">Date</th>
<th class="p-2">Driver</th>
<th class="p-2">Car</th>
<th class="p-2">Trips</th>
<th class="p-2">Earnings</th>
<th class="p-2">Action</th>
</tr>
</thead>
<tbody>
${tableRows}
</tbody>
</table>
</div>
`
}

totalTrips.innerText = trips

// chart
if(chart) chart.destroy()

chart = new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:Object.keys(driverMap),
datasets:[{
label:"Earnings",
data:Object.values(driverMap)
}]
}
})

})
}

// ===== Totals =====
function loadTotals(){
fetch("/totals")
.then(res=>res.json())
.then(t=>{
today.innerText=t.today
week.innerText=t.week
month.innerText=t.month
})
}

// ===== Save =====
function saveData(){

fetch(editId ? "/update/"+editId : "/add",{
method: editId ? "PUT" : "POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
date:date.value,
driverName:driverName.value,
carNumber:carNumber.value,
driverTrips:driverTrips.value,
driverEarning:driverEarning.value
})
})
.then(res=>res.text())
.then(msg=>{
alert(msg)
editId=null
clearForm()
loadData()
loadTotals()
})
}

// ===== Edit =====
function editData(id){
fetch("/data")
.then(res=>res.json())
.then(data=>{
const d = data.find(x=>x._id===id)

date.value = d.date
driverName.value = d.driverName
carNumber.value = d.carNumber
driverTrips.value = d.driverTrips
driverEarning.value = d.driverEarning

editId = id
})
}

// ===== Delete =====
function deleteData(id){
fetch("/delete/"+id,{method:"DELETE"})
.then(()=>{
loadData()
loadTotals()
})
}

// ===== Clear =====
function clearForm(){
driverName.value=""
carNumber.value=""
driverTrips.value=""
driverEarning.value=""
setToday()
}

// ===== Date =====
function setToday(){
date.value = new Date().toISOString().split("T")[0]
}

// ===== Profile =====
function toggleProfile(){
profileMenu.classList.toggle("hidden")
}

// ===== Logout =====
function logout(){
fetch("/logout").then(()=>window.location="login.html")
}

// ===== Username =====
const user = JSON.parse(localStorage.getItem("user"))
if(user) username.innerText = user.username

// ===== INIT =====
setToday()
loadDrivers()
loadData()
loadTotals()

window.onload = ()=>{
document.getElementById("loader").style.display="none"
}

</script>

</body>
</html>
