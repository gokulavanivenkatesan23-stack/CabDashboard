<!DOCTYPE html>
<html>

<head>
<title>Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-6 rounded shadow w-80">

<h2 class="text-xl mb-4 text-center">Login</h2>

<input id="username" placeholder="Username" class="border p-2 w-full mb-3 rounded">

<input id="password" type="password" placeholder="Password" class="border p-2 w-full mb-3 rounded">

<button onclick="login()" class="bg-blue-600 text-white w-full py-2 rounded">
Login
</button>

<p class="text-sm mt-3 text-center">
No account? <a href="register.html" class="text-blue-600">Register</a>
</p>

</div>

<script>

function login(){

fetch("/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username:username.value,
password:password.value
})
})
.then(res=>res.json())
.then(data=>{

if(data.status==="success"){

localStorage.setItem("user",JSON.stringify(data))
window.location="index.html"

}else{
alert("Invalid login")
}

})
.catch(err=>{
alert("Server error")
console.log(err)
})

}

</script>

</body>
</html>
